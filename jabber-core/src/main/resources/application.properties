spring.application.name=JABBER - JABBER V 5.5.0

# Server Configuration
server.port=8314

# H2 Embedded Database
spring.datasource.url=jdbc:h2:file:./jabber-data/jabber-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=jabber
spring.datasource.password=jabber_secured_2024
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS for Electron frontend
spring.web.cors.allowed-origins=*

# JABBER Configuration
jabber.creator.name=Funbinet
jabber.creator.website=dancan.tech
jabber.version=V 5.5.0

# V5.5: Report Storage - uses project-local path; resolves to /opt/jabber/reports when installed via deb
jabber.reports.base-dir=./reports

# Static Frontend Serving (V5.5 — eliminates separate frontend server)
# Spring Boot serves the built React app on the same port as the API
spring.web.resources.static-locations=file:/opt/jabber/ui/dist/,classpath:/static/
spring.web.resources.cache.period=31536000
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Logging
logging.level.com.jabber.jabber=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Allow large file uploads for payload operations
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
