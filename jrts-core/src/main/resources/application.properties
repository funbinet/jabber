spring.application.name=JRTS - Jabber Red Teaming Suite V3

# Server Configuration
server.port=8314

# H2 Embedded Database
spring.datasource.url=jdbc:h2:file:./jrts-data/jrts-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=jrts
spring.datasource.password=jabber_secured_2024
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS for Electron frontend
spring.web.cors.allowed-origins=*

# JRTS Configuration
jrts.creator.name=Funbinet
jrts.creator.website=dancan.tech
jrts.version=V3

# V3: Report Storage - uses project-local path; resolves to /opt/jrts/reports when installed via deb
jrts.reports.base-dir=./reports

# Logging
logging.level.com.jabber.jrts=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Allow large file uploads for payload operations
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
